<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hayyu Forex Trading</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a1f44;
    color: white;
}

/* HERO */
.hero {
    background: url('https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3') no-repeat center/cover;
    padding: 100px 20px;
    text-align: center;
}

.hero h1 {
    font-size: 45px;
    color: gold;
}

.hero p {
    font-size: 18px;
}

.btn {
    padding: 12px 25px;
    margin: 10px;
    background: gold;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* SECTIONS */
.section {
    padding: 50px 20px;
    text-align: center;
}

.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: #123a7a;
    margin: 15px;
    padding: 20px;
    width: 250px;
    border-radius: 10px;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

/* FOOTER */
footer {
    background: #081833;
    padding: 20px;
    text-align: center;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>Hayyu's Forex Trading</h1>
    <p>Your Trusted Partner for Global Currency Solutions</p>
    <button class="btn">Start Trading</button>
    <button class="btn">Contact Us</button>
</div>

<!-- SERVICES -->
<div class="section">
    <h2>Our Services</h2>
    <div class="cards">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1605902711622-cfb43c4437d1">
            <h3>Currency Exchange</h3>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1580519542036-c47de6196ba5">
            <h3>Money Transfer</h3>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1563013544-824ae1b704d3">
            <h3>Secure Payments</h3>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1502920917128-1aa500764cbd">
            <h3>Global Coverage</h3>
        </div>
    </div>
</div>

<!-- CURRENCIES -->
<div class="section">
    <h2>Supported Currencies</h2>
    <div class="cards">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1580519542036-c47de6196ba5">
            <h3>USD</h3>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1611078489935-0cb964de46d6">
            <h3>GBP</h3>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1579621970795-87facc2f976d">
            <h3>EUR</h3>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1604594849809-dfedbc827105">
            <h3>CFA</h3>
        </div>

    </div>
</div>

<!-- CONTACT -->
<div class="section">
    <h2>Contact Us</h2>
    <p>📍 Accra, Ghana</p>
    <p>📞 +233 XXX XXX XXX</p>
</div>

<footer>
    <p>© 2026 Hayyu Forex Trading</p>
</footer>

</body>
</html>
